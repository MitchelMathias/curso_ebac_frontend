<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para responsividade -->
    <title>Mídia</title> <!-- Define o título da página -->
</head>
<body>
    <img src="/midia/imagem_module 3.jpg" alt="Uma abelha em uma flor amarela"/> <!-- Exibe uma imagem, 'src' define o caminho e 'alt' descreve a imagem para acessibilidade -->
    <video controls src="/midia/video_module 3.mp4" alt="Um video com um senhor uma fogueira de chão e um bully"></video> <!-- Exibe um vídeo, 'controls' adiciona controles de vídeo e 'alt' descreve o vídeo -->
    <audio controls src="/midia/musica_module 3.mp3" alt="Uma canção"></audio> <!-- Reproduz um áudio, 'controls' adiciona controles de áudio e 'alt' descreve o áudio -->
</body>
</html>
