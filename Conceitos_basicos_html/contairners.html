<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para responsividade -->
    <title>Containers HTML</title> <!-- Define o título da página -->
</head>
<body>
    <header> <!-- Inicia o cabeçalho da página -->
       <h1>Containers</h1> <!-- Define o título principal -->
       <a href="./index.html">Home</a> <!-- Link para a página inicial -->
    </header>
    <main> <!-- Inicia o conteúdo principal da página -->
        <section> <!-- Inicia uma seção -->
            <h2>Esportes</h2> <!-- Título da seção de esportes -->
            <article> <!-- Inicia um artigo -->
                Hoje Brasil x Argentina <!-- Texto do artigo sobre esportes -->
            </article> <!-- Fecha o artigo -->
        </section> <!-- Fecha a seção -->
            <h2>Economia</h2> <!-- Título da seção de economia -->
            <article> <!-- Inicia um artigo -->
                Desemprego diminui em 1% <!-- Texto do artigo sobre economia -->
            </article> <!-- Fecha o artigo -->
        <section> <!-- Inicia uma nova seção (mas deveria fechar a anterior) -->
    </main> <!-- Fecha o conteúdo principal -->
    <footer> <!-- Inicia o rodapé da página -->
        &copy;2024 - Todos Direitos reservados <!-- Texto do rodapé -->
    </footer> <!-- Fecha o rodapé -->
</body>
</html>
