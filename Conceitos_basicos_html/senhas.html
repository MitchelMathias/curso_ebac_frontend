<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para responsividade -->
    <title>Senhas</title> <!-- Define o título da página -->
</head>
<body>
    <form> <!-- Início do formulário -->
        <label for="user">Usuário: </label> <!-- 'for' linka o rótulo ao campo de input com o id correspondente -->
        <input id="user" type="email"><br/> <!-- Campo de input para e-mail com o id "user" e quebra de linha -->
        <label for="password">Senha: </label> <!-- Rótulo para o campo de senha, linkado pelo atributo 'for' -->
        <input id="password" type="password"> <!-- Campo de input para senha com o id "password" -->
    </form> <!-- Fecha o formulário -->
</body>
</html>
