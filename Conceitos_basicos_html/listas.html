<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para responsividade -->
    <title>Listas HTML</title> <!-- Define o título da página -->
</head>
<body>
    <header> <!-- Inicia o cabeçalho da página -->
        <h1>Listas</h1> <!-- Define o título principal -->
        <a href="./index.html">Pagina Inicial</a><br/> <!-- Link para a página inicial e quebra de linha -->
    </header>
    <main> <!-- Inicia o conteúdo principal da página -->
        <section> <!-- Inicia uma seção -->
            <h2>Listas Ordenadas</h2> <!-- Título da seção de listas ordenadas -->
            <ol> <!-- Início de uma lista ordenada -->
                <li>Primeiro Item</li> <!-- Item 1 da lista -->
                <li>Segundo Item</li> <!-- Item 2 da lista -->
                <li>Terceiro Item</li> <!-- Item 3 da lista -->
                <li>Quarto Item</li> <!-- Item 4 da lista -->
                <li>Quinto Item</li> <!-- Item 5 da lista -->
                <li>Sexto Item</li> <!-- Item 6 da lista -->
            </ol> <!-- Fecha a lista ordenada -->
        </section> <!-- Fecha a seção -->
        <section> <!-- Inicia outra seção -->
            <h2>Lista Não Ordenadas</h2> <!-- Título da seção de listas não ordenadas -->
            <ul> <!-- Início de uma lista não ordenada -->
                <li>Item</li> <!-- Item da lista não ordenada -->
                <li>Item</li> <!-- Item da lista não ordenada -->
                <li>Item</li> <!-- Item da lista não ordenada -->
                <li>Item</li> <!-- Item da lista não ordenada -->
                <li>Item</li> <!-- Item da lista não ordenada -->
            </ul> <!-- Fecha a lista não ordenada -->
        </section> <!-- Fecha a seção -->
    </main> <!-- Fecha o conteúdo principal -->
</body>
</html>
