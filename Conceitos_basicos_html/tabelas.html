<!DOCTYPE html> <!-- Define o documento como HTML5 -->
<html lang="pt-br"> <!-- Define o idioma como português do Brasil -->
<head>
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para responsividade -->
    <title>Tabelas</title> <!-- Define o título da página -->
</head>
<body>
    <header> <!-- Cabeçalho da página -->
        <h1>Tabelas</h1> <!-- Título principal da página -->
        <a href="./index.html">Pagina Inicial</a><br/><br/> <!-- Link para a página inicial e quebra de linha dupla -->
    </header>
    <table> <!-- Início da tabela -->
        <caption>Teste Tabelas</caption> <!-- Título descritivo da tabela -->
        <thead> <!-- Cabeçalho da tabela -->
            <tr> <!-- Linha do cabeçalho -->
                <th>Nome do aluno</th> <!-- Cabeçalho da coluna "Nome do aluno" -->
                <th>Nota do aluno</th> <!-- Cabeçalho da coluna "Nota do aluno" -->
            </tr>
        </thead>
        <tbody> <!-- Corpo da tabela -->
            <tr> <!-- Linha da tabela -->
                <td>Aluno A</td> <!-- Célula com o nome do aluno A -->
                <td>10</td> <!-- Célula com a nota do aluno A -->
            </tr>
            <tr> <!-- Linha da tabela -->
                <td>Aluno B</td> <!-- Célula com o nome do aluno B -->
                <td>9</td> <!-- Célula com a nota do aluno B -->
            </tr>
        </tbody>
        <tfoot> <!-- Rodapé da tabela -->
            <tr> <!-- Linha do rodapé -->
                <td>Média</td> <!-- Célula com a palavra "Média" -->
                <td>9.5</td> <!-- Célula com a média das notas -->
            </tr>
        </tfoot>
    </table> <!-- Fim da tabela -->
</body>
</html>
